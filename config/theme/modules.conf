# integrii theme — status bar modules

# Load modules
source ~/.config/tmux/theme/kubernetes.conf
source ~/.config/tmux/theme/podman.conf
source ~/.config/tmux/theme/directory.conf

# Initial status line (resize script overrides this dynamically)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@integrii_status_directory}#{E:@integrii_status_kubernetes}#{E:@integrii_status_podman}#(${HOME}/.sh/tmux-battery-status.sh)"

# Powerline window tabs — must use script to preserve unicode arrow chars
run-shell "~/.sh/tmux-window-style.sh"
