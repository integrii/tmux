# vim:set ft=tmux:
# integrii theme — kubernetes module
%hidden MODULE_NAME="kubernetes"

set -gq "@integrii_${MODULE_NAME}_icon" "󰠳"
set -gqF "@integrii_${MODULE_NAME}_color" "#0080FF"
set -gq "@integrii_${MODULE_NAME}_text" "#($HOME/.sh/kubectl.tmux.sh)"

set -gF "@integrii_status_${MODULE_NAME}" \
  "#[fg=#0080FF,bg=default] #{@integrii_${MODULE_NAME}_icon}#[fg=#C0C0C0,bg=default] #{@integrii_${MODULE_NAME}_text}"
