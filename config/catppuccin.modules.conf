# Load custom modules
source /Users/eg/.config/tmux/plugins/tmux/custom/kubernetes.conf
source /Users/eg/.config/tmux/plugins/tmux/custom/podman.conf

# Load built-in modules
source /Users/eg/.config/tmux/plugins/tmux/status/directory.conf
source /Users/eg/.config/tmux/plugins/tmux/status/date_time.conf

# Initial status line (resize script overrides this dynamically)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_kubernetes}#{E:@catppuccin_status_podman}#(/Users/eg/.sh/tmux-battery-status.sh)"


# Powerline window tabs — must use script to preserve unicode arrow chars
run-shell "/Users/eg/.sh/tmux-window-style.sh"
