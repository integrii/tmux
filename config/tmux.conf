# set the command prefix to match gnuscreen (i.e. CTRL+a)
set -g prefix C-s
set-option -g prefix C-s

# C-s C-s for last window
bind-key C-s last-window

# start window numbering at 1
set -g base-index 1

# change how resizing chooses its size when two views are going on at once
setw -g aggressive-resize on

# supposedly there is a delay after the escape key. this kills it
set -s escape-time 0

# Activity monitoring
set -g monitor-activity off

# make the key bindings work like VIM
set-option -g status-keys vi
setw -g mode-keys vi

# use vim keys to switch panes without a leader (just hold control).  the if-shell here prevents looping selection.  
bind -n C-h if-shell "[[ #{pane_at_left} -eq 1 ]]" "" "select-pane -L"
# move pane down unless we're at the bottom already
bind -n C-j if-shell "[[ #{pane_at_bottom} -eq 1 ]]" "" "select-pane -D"
bind -n C-k if-shell "[[ #{pane_at_top} -eq 1 ]]" "" "select-pane -U"
bind -n C-l if-shell "[[ #{pane_at_right} -eq 1 ]]" "" "select-pane -R"


# Bind horizontal and vertical splits to more memorable sequences that open in the same path
unbind-key %
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# swap marked pane with current pane with b
bind-key b swap-pane

# fix the title on the mac terminal app
set -g set-titles on
set -g set-titles-string "#I:#W"

# rename windows automatically
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format '#{?#{!=:#(~/.sh/tmux-pane-icon.sh #{pane_pid} #{pane_current_path} #{window_id}),},#(~/.sh/tmux-pane-icon.sh #{pane_pid} #{pane_current_path} #{window_id}),#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}}' # tool = name via script + @pane_icon option, zsh = dir, else = command
set -g set-titles on # update the virtual terminal's window information

# refresh the status bar every second
set -g status-interval 1

# reload changes in tmux with C-s r
bind r source-file ~/.config/tmux/tmux.conf

# trigger a rename on all windows to update activity-based colors instantly
# also track active window index for context-aware powerline arrows
set-hook -g after-select-window "set-window-option -g automatic-rename on ; set -gF @active_idx '#{window_index}'"
set-hook -g after-new-window "set -gF @active_idx '#{window_index}'"
set-hook -g window-unlinked "set -gF @active_idx '#{window_index}'"


set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # move status bar to top of screen
# pane border colors set in theme/integrii.conf

# set the window options center
#set -g status-justify centre

# enable mouse input
set -g mouse on

# open new windows in the home directory (used to be current pane path)
#bind c new-window -c "#{pane_current_path}"
bind c new-window

# TMUX Screen savers
set-option -g lock-after-time 7200
#set -g lock-command "cbonsai -S" # cbonsai
#set -g lock-command "dvd" # dvd bounce
#set -g lock-command "cmatrix -s"
#set-option -g lock-after-time 600
#set -g lock-command "cbonsai -S" # cbonsai
set -g lock-command "cmatrix -sb -C green -u3" # cmatrix # lags on 45in ghostty
#set-option -g lock-command 'tmux clock' # start a clock 

# search backwards through prompt lines with F12 (like command-shift on macos)
bind-key -n F12 copy-mode \; send-keys -X search-backward "  "
bind-key -n S-F12 copy-mode \; send-keys -X search-forward "  "

# mouse scroll smoothing
set -g @scroll-speed-num-lines-per-scroll 1

# user overlay: settings and keybinding overrides
source-file -q ~/.config/tmux/overlay/settings.conf

# integrii theme
source-file ~/.config/tmux/theme/integrii.conf
source-file ~/.config/tmux/theme/modules.conf

# user overlay: theme overrides (after all theme files load)
source-file -q ~/.config/tmux/overlay/theme.conf

# user overlay: module and status bar overrides
source-file -q ~/.config/tmux/overlay/modules.conf

# resize modules based on terminal width and battery state
set-hook -g client-resized 'run-shell "~/.sh/resize-tmux-modules.sh"'
set-hook -g session-created 'run-shell "~/.sh/resize-tmux-modules.sh" ; set -gF @active_idx "#{window_index}"'
set-hook -g window-linked 'run-shell "~/.sh/resize-tmux-modules.sh"'

# user overlay: hooks (resize, git cache, etc.)
source-file -q ~/.config/tmux/overlay/hooks.conf

# Re-run module script periodically to pick up battery changes (via status-interval)
# Removed pane-focus-in hook — it fired on every pane switch, which was excessive

# Tell TPM where plugins live (moved from ~/.tmux/plugins to XDG path)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"

# Enable TPM for plugins
set -g @plugin 'tmux-plugins/tpm' # tmux plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible' # sensible tmux defaults plugin
set -g @plugin 'tmux-plugins/tmux-yank' # make macos clipboard work
#set -g @plugin 'tmux-plugins/tmux-cpu' # cpu display
set -g @plugin 'xamut/tmux-weather' # weather
set -g @plugin 'nhdaly/tmux-better-mouse-mode' # improved mouse controls
set -g @plugin 'tmux-plugins/tmux-copycat' # escape key + / to search history

# Ensure no gaps between window tabs
set -g window-status-separator ""

# user overlay: additional plugins
source-file -q ~/.config/tmux/overlay/plugins.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '/opt/homebrew/opt/tpm/share/tpm/tpm'
