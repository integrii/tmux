# Catppuccin v2 theme options (set BEFORE loading the plugin)
# Colors customized to match shell prompt (Adventure theme + powerline)

set -g @catppuccin_flavor 'mocha' # darkest flavor, closest to black terminal bg

# Use pure black status bg to match terminal background
set -g @catppuccin_status_background "#000000"

# Window appearance — disabled, using manual powerline format below
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_window_number_position "right"

# Window flags
set -g @catppuccin_window_flags "none"

# Pane appearance
set -g @catppuccin_pane_status_enabled "no"
set -g @catppuccin_pane_border_status "off"
set -g @catppuccin_pane_border_style "fg=#2A2A2A"
set -g @catppuccin_pane_active_border_style "fg=#3399FF"

# Status bar separators
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "yes"

# Date and time - blue to match prompt time section
set -g @catppuccin_date_time_icon "󰃰 "
set -g @catppuccin_date_time_color "#0080FF"
set -g @catppuccin_date_time_text " %A %B %d ❬ %I:%M %p"

# Directory - orange to match prompt section "a" (256-color 166 ~ #D75F00)
set -g @catppuccin_directory_text " #{b:pane_current_path}"
set -g @catppuccin_directory_color "#D75F00"
set -g @catppuccin_status_directory_icon_fg "#F4C566"
set -g @catppuccin_status_directory_icon_bg "#000000"

# Weather
set-option -g @tmux-weather-location "98332"
set-option -g @tmux-weather-units "u"
set-option -g @tmux-weather-interval 15
set-option -g @tmux-weather-format "%c%t"
set -g @catppuccin_weather_color "#45a3f5" # Color for weather

# battery settings
set -g @catppuccin_battery_color "#e7ff7a" # Color for battery
set -g @catppuccin_battery_icon "󰁹" # override the default icon because it bugs out and makes a gap. set to "null" for no icon

# cpu settings
set -g @catppuccin_cpu_color "#efffa6" # Color for cpu

# Pane appearance
set -g @catppuccin_pane_border_status "off" # Pane border status
set -g @catppuccin_pane_left_separator "▍" # Left pane separator
set -g @catppuccin_pane_right_separator "▐" # Right pane separator
set -g @catppuccin_pane_middle_separator "" # Middle pane separator

# Window title
set -g @catppuccin_window_default_text " #W |" # Default window title
set -g @catppuccin_window_current_text " #W |" # Current window title

# Status bar modules and separators
# merged curved edge all colored fully
#set -g @catppuccin_status_left_separator  " " # Left status separator
#set -g @catppuccin_status_right_separator "" # Right status separator
#set -g @catppuccin_status_right_separator_inverse "no" # Disable inverse right separator
#set -g @catppuccin_status_fill "all" # Fill style for status bar (all or icon)
#set -g @catppuccin_status_connect_separator "yes" # connect various status areas together

# squares theme from website examples
set -g @catppuccin_status_fill "icon" # Fill style for status bar (all or icon)
#set -g @catppuccin_status_modules_right "application session user host date_time"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator ""

# Directory appearance
set -g @catppuccin_directory_text " #(basename #{pane_current_path}) " # only show current basename in directory (it gets real long)

# resize modules used based on terminal width
set-hook -g client-resized 'run-shell "/Users/eg/.sh/resize-tmux-modules.sh"'
#set-hook -g after-resize-window 'run-shell "/Users/eg/.sh/resize-tmux-modules.sh"'

source-file /Users/eg/.config/tmux/catppuccin.modules.conf


